name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      # Start Mock LPS in background
      - name: Start Mock LPS
        run: |
          npm run mock:lps &
          sleep 5

      # Run tests
      - name: Run Tests
        run: npm test